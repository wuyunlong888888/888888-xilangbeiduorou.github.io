<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西狼北多肉 · 商品价格表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 40px;
            border-radius: 20px 20px 0 0;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        /* 登录按钮 */
        .login-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            color: #fff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .login-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .user-info {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-info span {
            color: #fff;
            font-size: 0.9rem;
        }

        .logout-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.5);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .change-pass-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .change-pass-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .content {
            background: #fff;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        /* 搜索区域 */
        .search-section {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 18px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box::before {
            content: "🔍";
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
        }

        .date-filter {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .date-filter label {
            color: #666;
            font-weight: 500;
        }

        .date-filter input[type="date"] {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .date-filter input[type="date"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-clear {
            padding: 12px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #666;
            transition: all 0.3s ease;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        /* 管理员操作栏 */
        .admin-bar {
            display: none;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
            border-radius: 12px;
            border: 2px dashed #667eea;
        }

        .admin-bar.active {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .admin-bar-title {
            font-weight: 600;
            color: #667eea;
            margin-right: 10px;
        }

        .btn-add {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.3s ease;
        }

        .btn-add:hover {
            transform: translateY(-2px);
        }

        /* 表格样式 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        th {
            padding: 18px 15px;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 1px;
        }

        td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
        }

        tbody tr {
            transition: background 0.3s ease;
        }

        tbody tr:hover {
            background: #f8f9ff;
        }

        tbody tr:nth-child(even) {
            background: #fafafa;
        }

        tbody tr:nth-child(even):hover {
            background: #f0f2ff;
        }

        /* 拖拽排序样式 */
        tbody tr.draggable {
            cursor: move;
        }

        tbody tr.dragging {
            opacity: 0.5;
            background: #e8eaff !important;
        }

        tbody tr.drag-over {
            border-top: 3px solid #667eea;
        }

        .drag-handle {
            cursor: move;
            padding: 5px;
            color: #999;
            font-size: 1.2rem;
        }

        tbody tr.draggable:hover .drag-handle {
            color: #667eea;
        }

        /* 日期列样式 */
        .date-cell {
            font-weight: 500;
            color: #667eea;
            white-space: nowrap;
        }

        /* 图片列样式 */
        .img-cell {
            width: 80px;
        }

        .img-cell img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .img-cell img:hover {
            transform: scale(1.1);
        }

        /* 品种名列 */
        .name-cell {
            font-weight: 600;
            color: #333;
        }

        /* 价格列 */
        .price-cell {
            font-weight: 700;
            color: #e74c3c;
            font-size: 1.1rem;
        }

        /* 操作按钮 */
        .action-btns {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .action-btn {
            padding: 6px 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .action-btn.delete {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        /* 灯箱样式 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 10px;
        }

        .lightbox-close {
            position: absolute;
            top: -50px;
            right: 0;
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 登录弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-title {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        /* 编辑弹窗 */
        .edit-modal .modal-content {
            max-width: 500px;
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
            margin-top: 10px;
            border: 2px dashed #ddd;
        }

        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }

        .file-input-wrapper input[type=file] {
            position: absolute;
            left: -9999px;
        }

        .file-input-label {
            padding: 10px 20px;
            background: #f5f5f5;
            border: 2px dashed #ccc;
            border-radius: 8px;
            cursor: pointer;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .file-input-label:hover {
            background: #e8e8e8;
            border-color: #667eea;
        }

        /* 批量导入样式 */
        .batch-modal-content {
            max-width: 600px;
        }

        .batch-upload-zone {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .batch-upload-zone:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .batch-upload-zone.dragover {
            border-color: #667eea;
            background: #eef0ff;
        }

        .batch-upload-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .batch-upload-zone p {
            color: #888;
            font-size: 0.95rem;
        }

        .batch-preview-list {
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .batch-preview-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #eee;
            transition: all 0.3s ease;
            background: #fff;
        }

        .batch-preview-item:hover {
            border-color: #667eea;
        }

        .batch-preview-item img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            display: block;
        }

        .batch-preview-item .item-number {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(102, 126, 234, 0.9);
            color: #fff;
            font-size: 0.7rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .batch-preview-item .item-remove {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(231, 76, 60, 0.9);
            color: #fff;
            font-size: 0.75rem;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .batch-preview-item .item-remove:hover {
            transform: scale(1.2);
        }

        .batch-preview-item .item-filename {
            padding: 4px 6px;
            font-size: 0.7rem;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .batch-settings {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
        }

        .batch-hint {
            margin-top: 10px;
            padding: 10px 15px;
            background: #fff9e6;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #d4a017;
        }

        .batch-add-more {
            margin-top: 10px;
            text-align: center;
        }

        .batch-add-more-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.3s ease;
            width: 100%;
        }

        .batch-add-more-btn:hover {
            transform: translateY(-2px);
        }

        .batch-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        /* 无结果提示 */
        .no-result {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .no-result-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px 15px;
                border-radius: 15px 15px 0 0;
            }

            .header h1 {
                font-size: 1.3rem;
                letter-spacing: 1px;
            }

            .header p {
                font-size: 0.85rem;
            }

            .login-btn, .user-info {
                position: static;
                margin-top: 10px;
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
            }

            .login-btn {
                padding: 8px 15px;
                font-size: 0.8rem;
            }

            .user-info span {
                font-size: 0.8rem;
            }

            .logout-btn, .change-pass-btn {
                padding: 6px 12px;
                font-size: 0.75rem;
            }

            .content {
                padding: 15px;
                border-radius: 0 0 15px 15px;
            }

            .search-section {
                flex-direction: column;
                gap: 10px;
            }

            .search-box {
                min-width: 100%;
            }

            .search-box input {
                padding: 10px 12px 10px 35px;
                font-size: 0.85rem;
            }

            .date-filter {
                flex-wrap: wrap;
                gap: 8px;
                font-size: 0.85rem;
            }

            .date-filter label {
                font-size: 0.85rem;
            }

            .date-filter input[type="date"] {
                padding: 10px;
                font-size: 0.85rem;
                flex: 1;
                min-width: 120px;
            }

            .btn-clear {
                padding: 10px 15px;
                font-size: 0.85rem;
                width: 100%;
            }

            .admin-bar {
                padding: 12px;
            }

            .admin-bar-title {
                font-size: 0.85rem;
                width: 100%;
                margin-bottom: 8px;
            }

            .btn-add {
                padding: 10px 15px;
                font-size: 0.85rem;
                flex: 1;
                min-width: 0;
            }

            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            table {
                min-width: 600px;
            }

            th {
                padding: 12px 8px;
                font-size: 0.85rem;
                letter-spacing: 0;
            }

            td {
                padding: 10px 8px;
                font-size: 0.85rem;
            }

            .img-cell {
                width: 60px;
            }

            .img-cell img {
                width: 45px;
                height: 45px;
            }

            .name-cell {
                font-size: 0.9rem;
            }

            .price-cell {
                font-size: 1rem;
            }

            .action-btns {
                flex-wrap: wrap;
                gap: 3px;
            }

            .action-btn {
                padding: 5px 8px;
                font-size: 0.75rem;
                border-radius: 12px;
            }

            .no-result {
                padding: 30px 20px;
            }

            .no-result-icon {
                font-size: 2.5rem;
            }

            .no-result p {
                font-size: 0.9rem;
            }

            /* 弹窗移动端适配 */
            .modal-content {
                padding: 20px;
                margin: 10px;
                max-height: 90vh;
                overflow-y: auto;
            }

            .modal-title {
                font-size: 1.1rem;
                margin-bottom: 15px;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            .form-group input {
                padding: 10px 12px;
                font-size: 0.9rem;
            }

            .btn-submit {
                padding: 12px;
                font-size: 0.9rem;
            }

            .lightbox-content {
                max-width: 95%;
                max-height: 80%;
            }

            .lightbox-close {
                top: -35px;
                right: 0;
                width: 30px;
                height: 30px;
                font-size: 1.2rem;
            }

            /* 批量导入移动端适配 */
            .batch-upload-zone {
                padding: 20px 15px;
            }

            .batch-upload-icon {
                font-size: 2.5rem;
            }

            .batch-preview-list {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 8px;
                max-height: 200px;
            }

            .batch-preview-item img {
                height: 70px;
            }

            .batch-actions {
                flex-direction: column;
            }
        }

        /* 超小屏幕适配 */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.1rem;
            }

            th, td {
                padding: 8px 5px;
                font-size: 0.8rem;
            }

            .img-cell img {
                width: 40px;
                height: 40px;
            }

            .action-btn {
                padding: 4px 6px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌵 西狼北多肉 · 商品价格表</h1>
            <p>欢迎浏览我们的商品价格</p>
            <button class="login-btn" id="loginBtn" onclick="showLoginModal()">🔐 管理员登录</button>
            <div class="user-info" id="userInfo" style="display: none;">
                <span>👤 管理员</span>
                <button class="change-pass-btn" onclick="showChangePassModal()">修改密码</button>
                <button class="logout-btn" onclick="logout()">退出</button>
            </div>
        </div>

        <div class="content">
            <!-- 管理员操作栏 -->
            <div class="admin-bar" id="adminBar">
                <span class="admin-bar-title">🔧 管理操作：</span>
                <button class="btn-add" onclick="showAddModal()">➕ 添加商品</button>
                <button class="btn-add" onclick="showBatchModal()">📦 批量导入</button>
                <button class="btn-add" onclick="toggleSortMode()" id="sortBtn">🔀 排序模式</button>
            </div>

            <!-- 搜索区域 -->
            <div class="search-section">
                <div class="search-box">
                    <input type="text" id="nameSearch" placeholder="搜索多肉品种（如：桃蛋、冰玉、橙梦露）">
                </div>
                <div class="date-filter">
                    <label>📅 日期筛选：</label>
                    <input type="date" id="startDate">
                    <span>至</span>
                    <input type="date" id="endDate">
                    <button class="btn-clear" onclick="clearFilters()">清除筛选</button>
                </div>
            </div>

            <!-- 表格 -->
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 100px;">图片</th>
                            <th>品种名</th>
                            <th>规格</th>
                            <th>价格</th>
                            <th style="width: 100px;">📅 上架日期</th>
                            <th style="width: 120px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="productTable">
                        <!-- 数据将通过JS动态生成 -->
                    </tbody>
                </table>
                <div class="no-result" id="noResult" style="display: none;">
                    <div class="no-result-icon">🔍</div>
                    <p>没有找到匹配的商品</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 灯箱 -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox()">×</button>
            <img class="lightbox-img" id="lightboxImg" src="" alt="">
        </div>
    </div>

    <!-- 登录弹窗 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3 class="modal-title">🔐 管理员登录</h3>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            <button class="btn-submit" onclick="login()">登录</button>
            <p class="error-msg" id="loginError">用户名或密码错误</p>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal" id="changePassModal">
        <div class="modal-content">
            <h3 class="modal-title">🔐 修改密码</h3>
            <div class="form-group">
                <label>当前密码</label>
                <input type="password" id="currentPass" placeholder="请输入当前密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" id="newPass" placeholder="请输入新密码">
            </div>
            <div class="form-group">
                <label>确认新密码</label>
                <input type="password" id="confirmPass" placeholder="请再次输入新密码">
            </div>
            <button class="btn-submit" onclick="changePassword()">确认修改</button>
            <p class="error-msg" id="passError"></p>
        </div>
    </div>

    <!-- 添加/编辑商品弹窗 -->
    <div class="modal edit-modal" id="editModal">
        <div class="modal-content">
            <h3 class="modal-title" id="editModalTitle">➕ 添加商品</h3>
            <input type="hidden" id="editIndex">
            <div class="form-group">
                <label>📅 上架日期</label>
                <input type="date" id="editDate">
            </div>
            <div class="form-group">
                <label>🖼️ 商品图片</label>
                <div class="file-input-wrapper">
                    <input type="file" id="editImageFile" accept="image/*" onchange="previewImage(this)">
                    <label for="editImageFile" class="file-input-label">📁 选择图片</label>
                </div>
                <img class="image-preview" id="imagePreview" style="display: none;">
                <input type="hidden" id="editImage">
            </div>
            <div class="form-group">
                <label>🌵 品种名</label>
                <input type="text" id="editName" placeholder="如：桃蛋、冰玉">
            </div>
            <div class="form-group">
                <label>📏 规格</label>
                <input type="text" id="editSpec" placeholder="如：单头 / 3cm">
            </div>
            <div class="form-group">
                <label>💰 价格 (¥)</label>
                <input type="number" id="editPrice" placeholder="0.00" step="0.01">
            </div>
            <button class="btn-submit" onclick="saveProduct()">保存</button>
        </div>
    </div>

    <!-- 批量导入图片弹窗 -->
    <div class="modal" id="batchModal">
        <div class="modal-content batch-modal-content">
            <h3 class="modal-title">📦 批量导入图片</h3>
            <p style="color:#999;font-size:0.85rem;text-align:center;margin-bottom:15px;">可以多次选择图片，点击"继续添加"累加更多图片</p>

            <!-- 上传区域 -->
            <div class="batch-upload-zone" id="batchUploadZone">
                <div class="batch-upload-icon">📁</div>
                <p>点击选择图片</p>
                <p style="font-size:0.8rem;color:#bbb;margin-top:5px;">支持 JPG、PNG、WebP 格式</p>
                <input type="file" id="batchImageInput" accept="image/jpeg,image/png,image/webp" multiple style="display:none;" onchange="handleBatchImages(this.files); this.value='';">
            </div>

            <!-- 继续添加按钮 -->
            <div class="batch-add-more" id="batchAddMore" style="display:none;">
                <button class="batch-add-more-btn" onclick="document.getElementById('batchImageInput').click();">➕ 继续添加图片 (已选 <span id="batchCountInline">0</span> 张)</button>
            </div>

            <!-- 图片预览列表 -->
            <div class="batch-preview-list" id="batchPreviewList"></div>

            <!-- 统一设置 -->
            <div class="batch-settings" id="batchSettings" style="display:none;">
                <div class="form-group">
                    <label>📅 上架日期</label>
                    <input type="date" id="batchDate" value="">
                </div>
                <div class="batch-hint">💡 提示：每张图片会生成一条记录，您可以导入后逐个编辑名称、规格和价格</div>
            </div>

            <!-- 操作按钮 -->
            <div class="batch-actions" id="batchActions" style="display:none;">
                <button class="btn-submit" onclick="saveBatchProducts()" style="flex:1;">✅ 确认导入 (<span id="batchCount">0</span>张)</button>
                <button class="btn-submit" onclick="closeBatchModal()" style="flex:0.6;background:#f5f5f5;color:#666;">取消</button>
            </div>
        </div>
    </div>

    <script>
        // 管理员账号（从localStorage读取，默认admin/123456）
        const ADMIN_USER = 'admin';
        let ADMIN_PASS = localStorage.getItem('adminPassword') || '123456';

        // 检查登录状态
        let isAdmin = sessionStorage.getItem('isAdmin') === 'true';

        // 商品数据
        let products = JSON.parse(localStorage.getItem('succulentProducts')) || [
            {
                date: '2025-04-01',
                image: 'https://picsum.photos/200/200?random=1',
                name: '佛座箍',
                spec: '70# / 萝卜腿',
                price: 45.00
            },
            {
                date: '2025-04-01',
                image: 'https://picsum.photos/200/200?random=2',
                name: '桃蛋',
                spec: '单头 / 3cm',
                price: 8.80
            },
            {
                date: '2025-04-02',
                image: 'https://picsum.photos/200/200?random=3',
                name: '冰玉',
                spec: '双头 / 4cm',
                price: 15.00
            },
            {
                date: '2025-04-02',
                image: 'https://picsum.photos/200/200?random=4',
                name: '橙梦露',
                spec: '群生 / 8cm',
                price: 38.00
            },
            {
                date: '2025-04-03',
                image: 'https://picsum.photos/200/200?random=5',
                name: '吉娃娃',
                spec: '单头 / 5cm',
                price: 12.50
            },
            {
                date: '2025-04-03',
                image: 'https://picsum.photos/200/200?random=6',
                name: '玉露',
                spec: '群生 / 6cm',
                price: 28.00
            }
        ];

        // 初始化
        function init() {
            updateLoginUI();
            renderTable(products);
        }

        // 更新登录状态UI
        function updateLoginUI() {
            const loginBtn = document.getElementById('loginBtn');
            const userInfo = document.getElementById('userInfo');
            const adminBar = document.getElementById('adminBar');

            if (isAdmin) {
                loginBtn.style.display = 'none';
                userInfo.style.display = 'flex';
                adminBar.classList.add('active');
            } else {
                loginBtn.style.display = 'block';
                userInfo.style.display = 'none';
                adminBar.classList.remove('active');
            }
            renderTable(products);
        }

        // 显示登录弹窗
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        // 登录
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === ADMIN_USER && password === ADMIN_PASS) {
                isAdmin = true;
                sessionStorage.setItem('isAdmin', 'true');
                document.getElementById('loginModal').classList.remove('active');
                updateLoginUI();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        // 退出登录
        function logout() {
            isAdmin = false;
            sessionStorage.removeItem('isAdmin');
            updateLoginUI();
        }

        // 显示修改密码弹窗
        function showChangePassModal() {
            document.getElementById('changePassModal').classList.add('active');
            document.getElementById('currentPass').value = '';
            document.getElementById('newPass').value = '';
            document.getElementById('confirmPass').value = '';
            document.getElementById('passError').style.display = 'none';
        }

        // 修改密码
        function changePassword() {
            const currentPass = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirmPass = document.getElementById('confirmPass').value;
            const errorMsg = document.getElementById('passError');

            if (currentPass !== ADMIN_PASS) {
                errorMsg.textContent = '当前密码错误';
                errorMsg.style.display = 'block';
                return;
            }

            if (newPass.length < 4) {
                errorMsg.textContent = '新密码至少4位';
                errorMsg.style.display = 'block';
                return;
            }

            if (newPass !== confirmPass) {
                errorMsg.textContent = '两次输入的新密码不一致';
                errorMsg.style.display = 'block';
                return;
            }

            // 保存新密码
            ADMIN_PASS = newPass;
            localStorage.setItem('adminPassword', newPass);
            
            alert('密码修改成功！');
            document.getElementById('changePassModal').classList.remove('active');
        }

        // 排序模式状态
        let sortMode = false;

        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('productTable');
            const noResult = document.getElementById('noResult');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                noResult.style.display = 'block';
                return;
            }
            
            noResult.style.display = 'none';
            tbody.innerHTML = data.map((product, index) => `
                <tr ${isAdmin && sortMode ? 'class="draggable" draggable="true"' : ''} data-index="${index}">
                    <td class="img-cell">
                        <img src="${product.image}" alt="${product.name}" onclick="openLightbox('${product.image}')">
                    </td>
                    <td class="name-cell">${product.name}</td>
                    <td>${product.spec}</td>
                    <td class="price-cell">¥${product.price.toFixed(2)}</td>
                    <td class="date-cell">
                        ${isAdmin && sortMode ? '<span class="drag-handle">⋮⋮</span> ' : ''}${product.date}
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn" onclick="openLightbox('${product.image}')">查看</button>
                            ${isAdmin && !sortMode ? `
                                <button class="action-btn" onclick="editProduct(${index})">编辑</button>
                                <button class="action-btn delete" onclick="deleteProduct(${index})">删除</button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');

            // 添加拖拽事件
            if (isAdmin && sortMode) {
                addDragEvents();
            }
        }

        // 切换排序模式
        function toggleSortMode() {
            sortMode = !sortMode;
            const sortBtn = document.getElementById('sortBtn');
            
            if (sortMode) {
                sortBtn.textContent = '✅ 完成排序';
                sortBtn.style.background = 'linear-gradient(135deg, #27ae60 0%, #2ecc71 100%)';
                alert('已进入排序模式，拖拽 ⋮⋮ 图标可调整商品顺序');
            } else {
                sortBtn.textContent = '🔀 排序模式';
                sortBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
            }
            
            renderTable(products);
        }

        // 添加拖拽事件
        function addDragEvents() {
            const rows = document.querySelectorAll('#productTable tr.draggable');
            let draggedRow = null;

            rows.forEach(row => {
                row.addEventListener('dragstart', function(e) {
                    draggedRow = this;
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                });

                row.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    rows.forEach(r => r.classList.remove('drag-over'));
                });

                row.addEventListener('dragover', function(e) {
                    e.preventDefault();
                    if (this !== draggedRow) {
                        this.classList.add('drag-over');
                    }
                });

                row.addEventListener('dragleave', function() {
                    this.classList.remove('drag-over');
                });

                row.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    
                    if (this !== draggedRow) {
                        const fromIndex = parseInt(draggedRow.dataset.index);
                        const toIndex = parseInt(this.dataset.index);
                        
                        // 交换数组元素
                        const item = products.splice(fromIndex, 1)[0];
                        products.splice(toIndex, 0, item);
                        
                        // 保存到本地存储
                        localStorage.setItem('succulentProducts', JSON.stringify(products));
                        
                        // 重新渲染
                        renderTable(products);
                    }
                });
            });
        }

        // 筛选功能
        function filterProducts() {
            const nameQuery = document.getElementById('nameSearch').value.toLowerCase();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            const filtered = products.filter(product => {
                const matchName = product.name.toLowerCase().includes(nameQuery);
                let matchDate = true;
                if (startDate && product.date < startDate) matchDate = false;
                if (endDate && product.date > endDate) matchDate = false;
                return matchName && matchDate;
            });

            renderTable(filtered);
        }

        // 清除筛选
        function clearFilters() {
            document.getElementById('nameSearch').value = '';
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            renderTable(products);
        }

        // 灯箱功能
        function openLightbox(src) {
            document.getElementById('lightboxImg').src = src;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // 显示添加弹窗
        function showAddModal() {
            document.getElementById('editModalTitle').textContent = '➕ 添加商品';
            document.getElementById('editIndex').value = '';
            document.getElementById('editDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('editImage').value = '';
            document.getElementById('editImageFile').value = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('editName').value = '';
            document.getElementById('editSpec').value = '';
            document.getElementById('editPrice').value = '';
            document.getElementById('editModal').classList.add('active');
        }

        // 编辑商品
        function editProduct(index) {
            const product = products[index];
            document.getElementById('editModalTitle').textContent = '✏️ 编辑商品';
            document.getElementById('editIndex').value = index;
            document.getElementById('editDate').value = product.date;
            document.getElementById('editImage').value = product.image;
            document.getElementById('imagePreview').src = product.image;
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('editName').value = product.name;
            document.getElementById('editSpec').value = product.spec;
            document.getElementById('editPrice').value = product.price;
            document.getElementById('editModal').classList.add('active');
        }

        // 预览图片
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('imagePreview').src = e.target.result;
                    document.getElementById('imagePreview').style.display = 'block';
                    document.getElementById('editImage').value = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // 保存商品
        function saveProduct() {
            const index = document.getElementById('editIndex').value;
            const date = document.getElementById('editDate').value;
            const image = document.getElementById('editImage').value || 'https://via.placeholder.com/200';
            const name = document.getElementById('editName').value.trim();
            const spec = document.getElementById('editSpec').value.trim();
            const price = parseFloat(document.getElementById('editPrice').value);

            if (!date || !name || !spec || isNaN(price)) {
                alert('请填写完整信息');
                return;
            }

            const product = { date, image, name, spec, price };

            if (index === '') {
                products.push(product);
            } else {
                products[index] = product;
            }

            localStorage.setItem('succulentProducts', JSON.stringify(products));
            document.getElementById('editModal').classList.remove('active');
            renderTable(products);
        }

        // 删除商品
        function deleteProduct(index) {
            if (confirm('确定要删除这个商品吗？')) {
                products.splice(index, 1);
                localStorage.setItem('succulentProducts', JSON.stringify(products));
                renderTable(products);
            }
        }

        // 事件监听
        document.getElementById('nameSearch').addEventListener('input', filterProducts);
        document.getElementById('startDate').addEventListener('change', filterProducts);
        document.getElementById('endDate').addEventListener('change', filterProducts);

        // 点击弹窗外部关闭
        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });
        document.getElementById('changePassModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('active');
        });

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('changePassModal').classList.remove('active');
                document.getElementById('editModal').classList.remove('active');
                document.getElementById('batchModal').classList.remove('active');
            }
        });

        // ========== 批量导入图片功能 ==========
        let batchImages = []; // 存储待导入的图片数据

        // 显示批量导入弹窗
        function showBatchModal() {
            batchImages = [];
            document.getElementById('batchPreviewList').innerHTML = '';
            document.getElementById('batchSettings').style.display = 'none';
            document.getElementById('batchActions').style.display = 'none';
            document.getElementById('batchDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('batchImageInput').value = '';
            document.getElementById('batchModal').classList.add('active');
        }

        // 关闭批量导入弹窗
        function closeBatchModal() {
            document.getElementById('batchModal').classList.remove('active');
            batchImages = [];
        }

        // 处理批量选择的图片文件
        function handleBatchImages(files) {
            if (!files || files.length === 0) return;

            const fileArray = Array.from(files);
            let loadedCount = 0;

            fileArray.forEach(file => {
                if (!file.type.startsWith('image/')) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    batchImages.push({
                        data: e.target.result,
                        name: file.name
                    });
                    loadedCount++;

                    if (loadedCount === fileArray.length) {
                        renderBatchPreview();
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        // 渲染批量预览列表
        function renderBatchPreview() {
            const list = document.getElementById('batchPreviewList');
            const settings = document.getElementById('batchSettings');
            const actions = document.getElementById('batchActions');
            const countSpan = document.getElementById('batchCount');
            const countInline = document.getElementById('batchCountInline');
            const addMore = document.getElementById('batchAddMore');

            if (batchImages.length === 0) {
                list.innerHTML = '';
                settings.style.display = 'none';
                actions.style.display = 'none';
                addMore.style.display = 'none';
                return;
            }

            settings.style.display = 'block';
            actions.style.display = 'flex';
            addMore.style.display = 'block';
            countSpan.textContent = batchImages.length;
            countInline.textContent = batchImages.length;

            list.innerHTML = batchImages.map((img, index) => `
                <div class="batch-preview-item">
                    <span class="item-number">${index + 1}</span>
                    <button class="item-remove" onclick="removeBatchImage(${index})">×</button>
                    <img src="${img.data}" alt="预览">
                    <div class="item-filename" title="${img.name}">${img.name}</div>
                </div>
            `).join('');
        }

        // 移除单张图片
        function removeBatchImage(index) {
            batchImages.splice(index, 1);
            renderBatchPreview();
        }

        // 保存批量导入的商品
        function saveBatchProducts() {
            if (batchImages.length === 0) {
                alert('请先选择图片');
                return;
            }

            const date = document.getElementById('batchDate').value;
            if (!date) {
                alert('请选择上架日期');
                return;
            }

            // 按图片顺序逐个创建商品条目
            batchImages.forEach(img => {
                // 从文件名中提取品种名（去掉扩展名）
                let name = img.name.replace(/\.[^.]+$/, '');
                // 如果文件名太长，截取前15个字符
                if (name.length > 15) name = name.substring(0, 15);

                products.push({
                    date: date,
                    image: img.data,
                    name: name,
                    spec: '待编辑',
                    price: 0.00
                });
            });

            // 保存到本地存储
            localStorage.setItem('succulentProducts', JSON.stringify(products));

            // 关闭弹窗并刷新表格
            closeBatchModal();
            renderTable(products);

            alert(`成功导入 ${batchImages.length} 张图片！\n\n请逐个编辑品种名、规格和价格。`);
        }

        // 批量上传区域的点击和拖拽事件
        document.addEventListener('DOMContentLoaded', function() {
            const uploadZone = document.getElementById('batchUploadZone');
            const fileInput = document.getElementById('batchImageInput');

            // 点击上传区域触发文件选择
            uploadZone.addEventListener('click', function() {
                fileInput.click();
            });

            // 拖拽进入
            uploadZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                e.stopPropagation();
                this.classList.add('dragover');
            });

            // 拖拽离开
            uploadZone.addEventListener('dragleave', function(e) {
                e.preventDefault();
                e.stopPropagation();
                this.classList.remove('dragover');
            });

            // 放下文件
            uploadZone.addEventListener('drop', function(e) {
                e.preventDefault();
                e.stopPropagation();
                this.classList.remove('dragover');

                const files = e.dataTransfer.files;
                handleBatchImages(files);
            });

            // 点击弹窗外部关闭批量导入弹窗
            document.getElementById('batchModal').addEventListener('click', function(e) {
                if (e.target === this) closeBatchModal();
            });
        });

        // 初始化
        init();
    </script>
</body>
</html>
